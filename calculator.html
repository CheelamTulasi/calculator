<html>
    <head>
        <title>Calculator</title>
    </head>
    <body>   

        <p class="js-output"></p>

        <p>
            <button onclick="
                updateCalculation(1);
                ">1</button>
            <button onclick="
                updateCalculation(2);
            ">2</button>
            <button onclick="
                updateCalculation(3);
            ">3</button>
            <button onclick="
                updateCalculation('+');
            ">+</button>
        </p>

        <p>
            <button onclick="
                updateCalculation(4);
                ">4</button>
            <button onclick="
                updateCalculation(5);
            ">5</button>
            <button onclick="
                updateCalculation(6);
            ">6</button>
            <button onclick="
                updateCalculation('-');
            ">-</button>
        </p>

        <p>
            <button onclick="
                updateCalculation(7);
                ">7</button>
            <button onclick="
                updateCalculation(8);
            ">8</button>
            <button onclick="
                updateCalculation(9);
            ">9</button>
            <button onclick="
                updateCalculation('*');
            ">*</button>
        </p>

        <p>
            <button onclick="
                updateCalculation(0);
                ">0</button>
            <button onclick="
                updateCalculation('.');
            ">.</button>
            <button onclick="
                updateCalculation('/');
            ">/</button>
            <button onclick="
                calculate=eval(calculate);
                document.querySelector('.js-output').innerHTML=calculate;
            ">=</button>
        </p>
        <button onclick="
            calculate='';
            document.querySelector('.js-output').innerHTML=calculate;
            localStorage.setItem('calculate',calculate);
        ">clear</button>
        <script>
            let calculate=localStorage.getItem('calculate')||'';
            document.querySelector('.js-output').innerHTML=calculate;
            function updateCalculation(num){
                calculate+=num;
                document.querySelector('.js-output').innerHTML=calculate;
                localStorage.setItem('calculate',calculate);
            }
        </script>
    </body>
</html>
